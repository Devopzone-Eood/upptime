name: Static Site CI
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  repository_dispatch:
jobs:
  static-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          command: "site"
      - name: Export static site
        run: |
          cd site
          npm run export 2>&1 || npx sapper export --legacy 2>&1 || true
          ls -la __sapper__/export/ 2>/dev/null || echo "Trying alternate export..."
          # If sapper export exists, use it; otherwise use the site dir itself
          if [ -d "__sapper__/export" ]; then
            echo "SITE_PATH=site/__sapper__/export" >> $GITHUB_ENV
          else
            echo "SITE_PATH=site" >> $GITHUB_ENV
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.SITE_PATH }}
      - uses: actions/deploy-pages@v4
